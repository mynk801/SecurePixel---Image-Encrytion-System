<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePixel | Auth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb; 
            color: #111; 
            display: flex; 
            height: 100vh; 
            align-items: center; 
            justify-content: center; 
            position: relative; /* Needed for the absolute footer */
        }
        
        .auth-card { 
            background: #fff; 
            padding: 3rem; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid #e5e7eb; 
            z-index: 10;
        }
        
        .logo { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.75rem; 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.75rem; 
            font-weight: 700; 
            margin-bottom: 2rem; 
        }
        
        .logo-icon { 
            width: 32px; 
            height: 32px; 
            background-color: #111; 
            border-radius: 6px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transform: rotate(45deg); 
        }
        
        .logo-icon::inner { content: ''; width: 12px; height: 12px; background-color: #fff; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 1rem; 
            margin-bottom: 1rem; 
            border: 1px solid #e5e7eb; 
            border-radius: 12px; 
            font-family: 'Inter', sans-serif; 
            font-size: 1rem; 
            outline: none; 
            transition: border-color 0.2s; 
            background: #f9fafb; 
        }
        
        input:focus { border-color: #111; background: #fff; }
        
        button { 
            width: 100%; 
            background: #111; 
            color: #fff; 
            border: none; 
            padding: 1rem; 
            border-radius: 50px; 
            font-family: 'Inter', sans-serif; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: opacity 0.2s; 
            margin-top: 0.5rem; 
        }
        
        button:hover { opacity: 0.8; }
        
        .toggle-link { 
            display: block; 
            margin-top: 1.5rem; 
            font-size: 0.9rem; 
            color: #6b7280; 
            cursor: pointer; 
            text-decoration: underline; 
        }
        
        .alert { padding: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; border-radius: 12px; border: 1px solid; }
        .alert-error { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .alert-success { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }

        /* --- FOOTER --- */
        .auth-footer {
            position: absolute;
            bottom: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }
        .footer-links {
            display: flex;
            gap: 1rem;
        }
        .footer-links a {
            color: #6b7280;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }
        .footer-links a:hover {
            color: #111;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon"><div style="width:10px; height:10px; background:#fff;"></div></div>
            SECURPXL
        </div>

        <div id="login-form-container">
            <h2 style="font-family: 'Space Grotesk'; margin-bottom: 1.5rem; font-size: 1.5rem;">Authentication</h2>
            
            {% if error %} <div class="alert alert-error">{{ error }}</div> {% endif %}
            {% if success %} <div class="alert alert-success">{{ success }}</div> {% endif %}

            <form action="/login" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Establish Session</button>
            </form>
            <span class="toggle-link" onclick="toggleForms()">No clearance? Register here.</span>
        </div>

        <div id="register-form-container" style="display: none;">
            <h2 style="font-family: 'Space Grotesk'; margin-bottom: 1.5rem; font-size: 1.5rem;">Initialize User</h2>
            <form action="/register" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="text" name="username" placeholder="Desired Username" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <button type="submit">Generate Credentials</button>
            </form>
            <span class="toggle-link" onclick="toggleForms()">Return to Authentication.</span>
        </div>
    </div>

    <footer class="auth-footer">
        <span>Developed by Mayank</span>
        <div class="footer-links">
            <a href="https://github.com/mynk801" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/mynk801/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
    </footer>

    <script>
        function toggleForms() {
            const login = document.getElementById('login-form-container');
            const register = document.getElementById('register-form-container');
            if (login.style.display === 'none') {
                login.style.display = 'block'; register.style.display = 'none';
            } else {
                login.style.display = 'none'; register.style.display = 'block';
            }
        }
    </script>
</body>
</html>
